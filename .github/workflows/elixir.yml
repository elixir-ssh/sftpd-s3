name: Elixir CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  minimum-support:
    name: Minimum support verification
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up minimum Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.14.5"
          otp-version: "26"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-min-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-min-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-min-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-min-

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio-min \
            -p 9001:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z server /data

      - name: Wait for MinIO
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9001/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs minio-min
          exit 1

      - name: Run tests
        run: mix test
        env:
          AWS_ENDPOINT_URL: http://localhost:9001
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1

  current:
    name: Current build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plts-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plts-

      - name: Install dependencies
        run: mix deps.get

      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z server /data

      - name: Wait for MinIO
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs minio
          exit 1

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests (non-integration)
        run: mix test --cover --exclude integration
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1

      - name: Run tests (with integration)
        run: mix test
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1

      - name: Run dialyzer
        run: mix dialyzer
        env:
          AWS_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
